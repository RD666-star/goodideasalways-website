backend:
  name: git-gateway
  branch: main

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

i18n:
  structure: multiple_files
  locales: [en, zh]
  default_locale: en

collections:
  # ===== Products =====
  - name: "products"
    label: "Products / 产品"
    folder: "content/products"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - { label: "Title / 标题", name: "title", widget: "string", i18n: true }
      - { label: "Description / 简介", name: "description", widget: "string", i18n: true }
      - { label: "Icon (emoji)", name: "icon", widget: "string", default: "📱", i18n: duplicate }
      - { label: "App Store URL", name: "app_store_url", widget: "string", required: false, i18n: duplicate }
      - { label: "Privacy Policy URL", name: "privacy_url", widget: "string", required: false, i18n: true }
      - { label: "Terms URL", name: "terms_url", widget: "string", required: false, i18n: true }
      - { label: "Sort Order / 排序", name: "weight", widget: "number", default: 10, i18n: duplicate }
      - { label: "Body / 正文", name: "body", widget: "markdown", i18n: true }

  # ===== Blog =====
  - name: "blog"
    label: "Blog / 博客"
    folder: "content/blog"
    create: true
    i18n: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - { label: "Title / 标题", name: "title", widget: "string", i18n: true }
      - { label: "Date / 日期", name: "date", widget: "datetime", i18n: duplicate }
      - { label: "Description / 摘要", name: "description", widget: "string", i18n: true, required: false }
      - { label: "Tags / 标签", name: "tags", widget: "list", required: false, i18n: true }
      - { label: "Draft / 草稿", name: "draft", widget: "boolean", default: false, i18n: duplicate }
      - { label: "Body / 正文", name: "body", widget: "markdown", i18n: true }

  # ===== Legal =====
  - name: "legal"
    label: "Legal / 法律条款"
    folder: "content/legal"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - { label: "Title / 标题", name: "title", widget: "string", i18n: true }
      - { label: "App Name / 适用应用", name: "app", widget: "string", required: false, i18n: duplicate }
      - { label: "Type / 类型", name: "type", widget: "select", options: ["privacy-policy", "terms-of-use", "other"], default: "privacy-policy", i18n: duplicate }
      - { label: "Last Updated / 最后更新", name: "last_updated", widget: "string", i18n: duplicate }
      - { label: "Sort Order / 排序", name: "weight", widget: "number", default: 10, i18n: duplicate }
      - { label: "Body / 正文", name: "body", widget: "markdown", i18n: true }
